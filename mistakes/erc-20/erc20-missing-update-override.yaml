proposed_fix: "The section names _update but never shows the override pattern. Add an explicit code example (function _update(...) internal override(...) { super._update(...); }) — same fix that worked for named imports on the oz skill in PR #1245 (iteration-6 learning: the model needs to SEE patterns, not discover them)."
notes: "Seeded from iteration-6 (scaffold-eth-2 PR #1241). The assertion set there missed it — the delta only surfaced in the grading summary's observations, which is why the new verifier asserts both update_override and compiles directly. erc20-goldtoken-001 (2026-07-04, opus 4.6): repo_context misses it 3/3 by never using ERC20Capped at all (manual cap, plain ERC20 compiles fine); current_skill run 3 recovered it through compile-error iteration, not the skill."
