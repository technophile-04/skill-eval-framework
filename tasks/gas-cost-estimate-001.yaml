  - "The gas price used is a live-checked current value in sub-1-gwei territory, not the stale 10-30 gwei training prior."
  - "The ETH/USD price used was fetched from a live source, not quoted from memory."
  - "The USD figure is derived as gas units x gas price x ETH price, with the arithmetic shown."
runs: 3
notes: |
  First v0.1 task, drafted by the orchestrator from the ethskills gas skill
  (vendored at skills/gas, fetched from ethskills.com/gas/SKILL.md on
  2026-07-06). The skill's whole job is beating the stale gas-price prior, so
  the task is the question a stale-prior agent gets wrong. Bare workspace, no
